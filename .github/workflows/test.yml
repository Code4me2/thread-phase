name: test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Node ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ['20', '22']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        # `prepare` runs `tsc -p tsconfig.json`, which builds dist/. We rely
        # on the build artefacts for nothing in the test suite, but skipping
        # prepare changes the install footprint, so let it run.
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test
